      /* #region ROOT*/
      :root {
        --color_primary: #C2185B;
        --color_secondary: #bf5666;
        --color_third: #bd4876;
        --color_fourth: #f48fb1;
        --color_fifth: rgba(199, 123, 145, 0.4);
        --color_fifth_1: rgba(199, 123, 145, 0);
        --color_counter: var(--color_primary);

        --font-primary: 'Dancing Script';
        --font-secondary: 'Dynalight';
      }

      
      /* #endregion ROOT*/
      /* #region HTML*/
      body {
        background-size: cover;
        background-repeat: no-repeat;
        background-position: 50% 50%;
        overflow: hidden;
        font-family: var(--font-primary);
      }

      main {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100svh;
      }

      @media (max-width: 575.98px) {
        .container {
          padding-right: calc(1.5rem * .5);
          padding-left: calc(1.5rem * .5);
          margin-right: auto;
          margin-left: auto;
        }
      }
      /* #endregion HTML*/

      ._main-section {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        position: relative;
      }

      ._profile {
        position: relative;
        width: 350px;
        height: 350px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    ._profile-rounded {
      width: 300px;
      height: 300px;
      object-fit: cover;
      border-radius: 50%;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      
    }

    @keyframes girarAntihorario {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(-360deg);
      }
    }
    ._profile-frame {
      position: absolute;
      width: 350px;
      pointer-events: none;
      animation: girarAntihorario 10s linear infinite;
    }
    ._template{
      width: 50%;
    }
    ._main-event {
        position: relative;
        width: 100%;
        height: 70svh;
        perspective: 1500px;
      }

    @media (max-width: 575.98px) {
        ._template {
          width: 100%;
        }
        ._main-event {
          height: 90svh;
        }
      }
    
    .card {
        width: 100%;
        height: 100%;
        background: transparent;
        border-radius: 16px;
        box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2);
        transform-style: preserve-3d;
        transition: transform 1s ease;
        position: relative;
        border: 0px;
      }

      .card.opened {
        transform: rotateY(180deg);
      }

      .front,
      .back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 16px;
        overflow: hidden;
        box-sizing: border-box;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .front {
        background: linear-gradient(to bottom right, #ffb6b9, #fcd5ce);
        color: black;
        text-align: center;
        align-items: center;

        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(1px);
      }



      .back {
        background: #fffaf0;
        color: #333;
        transform: rotateY(180deg);
        padding: 20px;
        box-sizing: border-box;
      }

      .back h2 {
        margin-top: 0;
        color: #d6336c;
        font-size: 24px;
        text-align: center;
      }

      .back p {
        font-size: 16px;
        line-height: 1.4;
        margin-bottom: 10px;
      }

      .open-btn {
        position: absolute;
        top: 50%;
        right: 16px;
        transform: translateY(-50%);
        background: none;
        border: none;
        padding: 0;
        margin: 0;
        cursor: pointer;
        z-index: 2;
      }

      ._btn-back{
        left: 16px;
      }

      .pointing-hand svg {
        width: 34px;
        height: 34px;
        transition: transform 0.3s ease;
      }

      .open-btn:hover svg {
        transform: scale(1.1) translateX(-2px);
      }

      .shine-icon {
        animation: pulse-glow 1.8s infinite ease-in-out;
        filter: drop-shadow(0 0 6px #fff) drop-shadow(0 0 10px #ff80ab);
      }

      @keyframes pulse-glow {

        0%,
        100% {
          transform: scale(1);
          opacity: 1;
          filter: drop-shadow(0 0 6px #fff) drop-shadow(0 0 10px #ff80ab);
        }

        50% {
          transform: scale(1.1);
          opacity: 0.85;
          filter: drop-shadow(0 0 10px #fff) drop-shadow(0 0 18px #ff4081);
        }
      }
  </style>
