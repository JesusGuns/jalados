  <script>
    requirejs(["jquery"], function ($) {
      let width, height, canvas, ctx, particles = [];

      $(document).ready(function () {
        initCanvas();
        $(window).on('resize', resize);
      });

      function initCanvas() {
        canvas = document.getElementById('spirit-canvas');
        ctx = canvas.getContext('2d');
        resize();

        const particleCount = Math.floor(width * 0.08); // menos partículas, más elegancia
        for (let i = 0; i < particleCount; i++) {
          particles.push(new Particle(true));
        }

        animate();
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);

        for (let i = 0; i < particles.length; i++) {
          particles[i].update();
          particles[i].draw();
        }

        requestAnimationFrame(animate);
      }

      function Particle(startRandom = false) {
        let _this = this;

        function init() {
          _this.pos = {
            x: Math.random() * width,
            y: startRandom ? Math.random() * height : Math.random() * -50
          };
          _this.alpha = 0.2 + Math.random() * 0.6; // transparencia inicial
          _this.scale = 0.05 + Math.random() * 0.4; // tamaño de la partícula
          _this.velocity = 0.2 + Math.random() * 0.5; // velocidad vertical
          _this.drift = Math.random() * 0.5 - 0.25; // movimiento horizontal suave
          _this.color = ["255,255,255", "255,240,200", "255,220,150"][Math.floor(Math.random() * 3)];
          _this.sparkleSpeed = Math.random() * 0.05 + 0.02; // velocidad del parpadeo
        }

        init();

        this.update = function () {
          // Movimiento vertical y horizontal suave
          _this.pos.y += _this.velocity;
          _this.pos.x += _this.drift;

          // Parpadeo suave (sparkle)
          _this.alpha += Math.sin(Date.now() * _this.sparkleSpeed) * 0.02;

          // Reinicia si sale de la pantalla
          if (_this.pos.y > height || _this.alpha <= 0) {
            init();
            _this.pos.y = 0;
          }
        };

        this.draw = function () {
          const gradient = ctx.createRadialGradient(
            _this.pos.x,
            _this.pos.y,
            0,
            _this.pos.x,
            _this.pos.y,
            _this.scale * 12
          );
          gradient.addColorStop(0, `rgba(${_this.color},${Math.min(Math.max(_this.alpha, 0), 1)})`);
          gradient.addColorStop(1, `rgba(${_this.color},0)`);

          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(_this.pos.x, _this.pos.y, _this.scale * 12, 0, Math.PI * 2);
          ctx.fill();
        };
      }
    });
  </script>
